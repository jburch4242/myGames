  .choice-btn:hover:not(:disabled) { background: #4a2810; border-color: #e8c040; transform: translateX(3px); }

  .end-wisdom { font-family: 'Special Elite', cursive; font-size: 0.9em; color: #5a3010; font-style: italic; border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold); padding: 8px; text-align: center; }
  .identity-bar { background: rgba(44,24,16,0.08); border: 1px solid var(--gold); border-radius: 4px; padding: 6px 12px; font-family: 'Special Elite', cursive; font-size: 0.78em; color: #5a3010; display: flex; gap: 16px; flex-wrap: wrap; }

  .bonus-tag { display: inline-block; background: #2d6a2d; color: #e0f0e0; font-size: 0.72em; padding: 1px 7px; border-radius: 8px; margin-left: 6px; font-family: 'Special Elite', cursive; }

  #content-area::-webkit-scrollbar { width: 6px; }
  #content-area::-webkit-scrollbar-track { background: var(--parchment); }

</style>

function getDynamicScenario(sc) {
  if (!sc.isDynamic) return sc;
  const out = Object.assign({}, sc);
  if (sc.dynamicKey === 'food') {
    const mp = S.mealPlan;
    if (mp === 'unlimited') {
      out.title = 'The Unlimited Plan Temptation';
      out.text = 'Week 10. You\'re on the Unlimited plan — technically invincible. But your friends keep saying "just downgrade and pocket the difference." The dining hall gleams. Your wallet is listening.';
      out.choices = [
        { text:'Exploit your plan to the fullest. Eat for sport.', outcome:'You become a dining hall legend. Four meals a day. The staff know your name. Your energy is immaculate.', stats:{ gpa:0, energy:+20, social:+10, money:0 } },
        { text:'Share your swipes generously. Build goodwill.', outcome:'You become the most popular person on the floor. Jake owes you forever.', stats:{ gpa:0, energy:+10, social:+25, money:0 } },
        { text:'Downgrade mid-semester to save money.', outcome:'You save money but lose the psychological security blanket of infinite food.', stats:{ gpa:0, energy:-5, social:0, money:+15 } },
        { text:'Start hoarding dining hall snacks for your dorm. Supply depot.', outcome:'Your room becomes a pantry. Efficiency is high. Roommate has questions.', stats:{ gpa:+0.1, energy:+10, social:-5, money:+10 } },
      ];
    } else if (mp === 'block150') {
      out.title = 'The Block 150 Midpoint Crisis';
      out.text = 'Week 10. You\'ve done the math. You have 22 swipes left. Thirty-eight meals remain before semester\'s end. The numbers do not add up.';
      out.choices = [
        { text:'Ration aggressively. One real meal a day, ramen fills the gaps.', outcome:'You survive but you\'re miserable and slightly malnourished.', stats:{ gpa:0, energy:-20, social:-5, money:+10 } },
        { text:'Buy a small dining plan top-up. Invest in the supply line.', outcome:'Expensive but sensible. You eat normally through finals. Peace of mind restored.', stats:{ gpa:+0.1, energy:+15, social:+5, money:-15 } },
        { text:'Befriend someone with unlimited swipes. Social engineering.', outcome:'BRILLIANT. Jake has a Block 300 plan and no concept of scarcity. Free meals twice a week.', stats:{ gpa:0, energy:+15, social:+20, money:+5 } },
        { text:'Ignore the problem entirely. Vibes-based meal planning.', outcome:'Three days of granola bars from your desk drawer.', stats:{ gpa:-0.1, energy:-25, social:-5, money:-5 } },

        { text:'Commit to the bit. Full ramen ascendancy. Embrace the sodium.', outcome:'You spend nothing and feel everything. Energy craters. Your bank account weeps tears of joy.', stats:{ gpa:0, energy:-30, social:-10, money:+20 } },

        { text:'Attend every club meeting with free food.', outcome:'Genius foraging. You join four clubs you have no interest in. You eat well.', stats:{ gpa:-0.1, energy:+15, social:+15, money:+10 } },
        { text:'Call home. Describe the situation. Wait for a care package.', outcome:'Your mom sends a box within 48 hours. It contains granola bars, which you now hate, and $40.', stats:{ gpa:0, energy:+10, social:0, money:+15 } },
      ];
    }
  }
  if (sc.dynamicKey === 'major') {
    const maj = S.major;
    const baseChoices = out.choices.map(c => Object.assign({}, c));

      out.text = 'You got a C- in Intro to Microeconomics. Your Business major wobbles. Your dad, who paid for this, has texted "how\'s econ going?" You have not replied.';
      baseChoices[0].text = 'Pivot to Marketing. Still Business, different battlefield.';
      baseChoices[0].outcome = 'Clean lateral move. You tell your dad it\'s "a specialization." He accepts this.';
      baseChoices[1].text = 'Retake Microeconomics. Demand curves will not defeat you.';
      baseChoices[1].outcome = 'You pass with a C. Supply and demand eventually submitted. Barely.';
    } else if (maj === 'engineering') {
      out.title = 'The Engineering Crucible';
      out.text = 'You failed Calculus II. Not badly — catastrophically. Your professor wrote "see me" in red ink large enough to be seen from orbit. Engineering suddenly feels very far away.';
      baseChoices[0].text = 'Switch to Computer Science. Technical, but the calculus is different.';
      baseChoices[0].outcome = 'A lateral move that preserves your dignity and your GPA trajectory. The coding is hard. The integrals are gone.';
      baseChoices[1].text = 'Retake Calc II. You will understand derivatives or perish.';
      baseChoices[1].outcome = 'You pass with a B-. The derivatives did not perish. Neither did you. Barely.';
    } else if (maj === 'liberalarts') {
      out.title = 'The Liberal Arts Reckoning';
      out.text = 'Your 12-page essay on postcolonial theory came back with a D+. Comment: "Interesting but unfocused." Your parents\' implied comment: "We told you so."';
      baseChoices[0].text = 'Switch to Communications. Adjacent. Defensible at Thanksgiving.';
      baseChoices[0].outcome = 'Smart pivot. Your relatives partially relax. Your GPA cautiously improves.';
      baseChoices[1].text = 'Rewrite the essay. Prove the professor wrong.';
      baseChoices[1].outcome = 'You resubmit. They give you a C+. You call this a moral victory.';
    } else {
      out.title = 'The Undecided Reckoning (As Prophesied)';
      out.text = 'You declared Undecided. The ancient masters warned you. And now, as foretold in the tutorial, the Major Crisis has arrived. Your advisor says you must choose something. The clock ticks.';
      baseChoices[0].text = 'Finally commit to a major. Any major. Right now.';
      baseChoices[0].outcome = 'You point at the course catalog and say the first word you see. It is Psychology. Close enough. Forward.';
    }
    out.choices = baseChoices;
  }
  return out;
}

// ── CHRONICLE BUILDER ─────────────────────────────────────────────────────────
function buildChronicle() {
  const maj = MAJORS.find(m => m.id === S.major);
  const mp  = MEAL_PLANS.find(m => m.id === S.mealPlan);
  const fg  = FRIEND_GROUPS.find(f => f.id === S.friendGroup);
  const sc  = SPRING_COMMITS.find(c => c.id === S.springCommit);

  const majName  = maj ? maj.name : 'an undeclared discipline';
  const mpName   = mp  ? mp.name  : 'an unnamed dining arrangement';
  const fgName   = fg  ? fg.name  : 'a shadowy social faction';
  const scName   = sc  ? sc.name.toLowerCase() : 'a mysterious commitment';

  const thermostat    = S.thermostatChoice  || 'navigated the thermostat dispute with questionable judgment';
  const allNighter    = S.allNighterChoice  || 'approached the Econ midterm through methods unrecorded';
  const groupProject  = S.groupProjectChoice|| 'handled the Marketing group project in a manner too chaotic to fully document';
  const finalStrat    = S.finalChoice       || 'approached finals with the energy of someone who had tried their best';

  const tier = S.gpa >= 3.5 ? 'triumph' : S.gpa >= 2.7 ? 'middling' : 'disaster';

  // Three storyline templates
  const STORIES = {
    triumph: [
      `Thus begins the legend of a ${majName} scholar of unimpeachable strategic genius, who descended upon the campus armed with a ${mpName} dining arrangement and an iron will. In those hallowed early weeks, our hero ${thermostat}, a decision the dormitory elders still debate to this day. Armed with provisions and a friend group known as ${fgName}, the warrior ${allNighter} — a maneuver so tactically elegant that Sun Tzu himself, peering down from whatever ancient cloud he haunts, was said to have nodded approvingly and updated his scroll.`,
      `The spring semester arrived like a second act in a hero's epic, and with it came the trials of ${majName} scholarship in full force. Our hero had committed to ${scName}, a decision that would test both constitution and calendar. The infamous group project — that crucible of human endurance — saw our champion ${groupProject}. Though Marcus remained a wildcard of catastrophic potential, the semester bent to the scholar's will, and the deadline extension was secured through diplomacy so elegant it bordered on the supernatural.`,
      `And so the year concluded in a blaze of academic glory, a GPA of ${gpaStr(S.gpa)} shining like a beacon over the smoldering ruins of lesser students' ambitions. In the final reckoning, our hero ${finalStrat}, securing victory with the calm certainty of one who had read the terrain, chosen their battles, and never once — not once — trusted Marcus with anything important. "Know thine enemy," wrote Sun Tzu. "And also know that Marcus will absolutely not finish his slides in time." — The Ancient Scholars of the College, Year One.`,
    ],
    middling: [
      `Hearken now to the tale of a ${majName} student of adequate but inconsistent genius, who arrived on campus clutching a ${mpName} dining arrangement and an optimism that would be gradually, methodically dismantled over nine months. The dormitory welcomed our hero with open arms and an immediate thermostat dispute, during which they ${thermostat} — a choice that defined the floor's social ecosystem for weeks. Having aligned with ${fgName}, the warrior prepared for the Econ midterm, whereupon they ${allNighter}. The ancient masters made no comment, but their silence was louder than words.`,
      `Spring arrived. Our hero, now weathered and slightly malnourished in spirit if not in body, committed to ${scName} — a bold declaration that introduced new complications into an already complicated academic existence. The Marketing group project became the semester's great crucible, and here our scholar ${groupProject}. Marcus remained a force of nature, untameable and largely ungraded. The research paper deadline passed with a mix of diplomacy and mild deception that Sun Tzu would call "acceptable, I suppose."`,
      `The year ended as it had lived: imperfectly, earnestly, and with a GPA of ${gpaStr(S.gpa)} that told the story of someone who tried, mostly, when it counted, somewhat. The final examination period saw our hero ${finalStrat}. "He who knows when he can fight and when he cannot will be victorious," wrote Sun Tzu. "He who is not entirely sure will achieve a 2.9 and call it a learning experience." — The Moderately Impressed Historians of the College, Year One.`,
    ],
    disaster: [
      `Let the record show that a ${majName} student did in fact survive freshman year, a fact that surprised the dining hall staff, the academic advisor, and at least two professors. Armed with a ${mpName} dining plan chosen with the strategic foresight of someone who had not yet read Chapter VIII, our hero began the fall semester by attempting to ${thermostat}. The dormitory was not the same afterward. The creature known as ${fgName} adopted this wandering academic, and together they faced the Econ midterm, during which the warrior ${allNighter}. It did not go as hoped.`,
      `Spring semester arrived to find our hero technically enrolled, which the administration acknowledged as the bare minimum definition of progress. The commitment to ${scName} introduced chaos where there was already chaos, creating a kind of academic chaos supercollider. When the group project descended, the scholar ${groupProject} — a maneuver that future historians will note was "bold" in the same way that sailing into a reef is bold. Marcus submitted his slides at 11:58pm. They were not good slides.`,
      `And yet — AND YET — the year ended with a GPA of ${gpaStr(S.gpa)}, which is a number that exists above the minimum threshold required to return in September. Our hero ${finalStrat}, emerging from finals week blinking into the light like someone who had been underground for a very long time and was not entirely sure what season it was. "The supreme art of war is to subdue the enemy without fighting," wrote Sun Tzu. "The supreme art of college is to subdue the GPA calculator at 11pm on the last day of finals." — The Baffled Historians of the College, Year One.`,
    ],
  };

  const story = STORIES[tier];
  return story.map((para, i) =>
    `<div class="chronicle-para" data-label="${['Fall Semester','Spring Semester','Verdict of the Ages'][i]}">${para}</div>`
  ).join('');
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function gpaStr(v) { return v.toFixed(2); }
function ca() { return document.getElementById('content-area'); }
function clear() { ca().innerHTML = ''; }

function applyMods(stats, sc) {
  const d = Object.assign({}, stats);
  const maj = MAJORS.find(m => m.id === S.major);
  if (maj) {
    if (maj.mods.gpaScale && d.gpa) d.gpa += d.gpa > 0 ? maj.mods.gpaScale : -Math.abs(maj.mods.gpaScale);
    if (maj.mods.moneyBonus && d.money) d.money += maj.mods.moneyBonus;
    if (maj.mods.energyDiscount && d.energy < 0) d.energy = Math.floor(d.energy * (1 - maj.mods.energyDiscount));
    if (maj.mods.socialBonus && d.social > 0) d.social += maj.mods.socialBonus;
  }
  const mp = MEAL_PLANS.find(m => m.id === S.mealPlan);
  if (mp && sc && sc.isFoodEvent) {
    if (mp.mods.foodShield && d.energy < 0) d.energy = 0;
    if (mp.mods.foodPenalty && d.energy < 0) d.energy = Math.floor(d.energy * 1.4);
  }
  const fg = FRIEND_GROUPS.find(f => f.id === S.friendGroup);
  if (fg) {
    if (fg.mods.socialScale && d.social) d.social = Math.round(d.social * fg.mods.socialScale);
    if (fg.mods.socialBonus && d.social > 0) d.social += fg.mods.socialBonus;
    if (fg.mods.energyScale && d.energy < 0) d.energy = Math.round(d.energy * fg.mods.energyScale);
    if (fg.mods.moneySlow && d.money > 0) d.money = Math.max(0, d.money - 3);
    if (fg.mods.energyShield && d.energy < 0) d.energy = Math.max(d.energy, -10);
    if (fg.mods.gpaBonus && d.gpa > 0) d.gpa += fg.mods.gpaBonus;
  }
  if (S.semester === 1) {
    const scc = SPRING_COMMITS.find(c => c.id === S.springCommit);
    if (scc) {
      if (scc.mods.socialBonus && d.social > 0) d.social += scc.mods.socialBonus;
      if (scc.mods.gpaBonus && d.gpa > 0) d.gpa += scc.mods.gpaBonus;
      if (scc.mods.moneyRegen) d.money = (d.money || 0) + scc.mods.moneyRegen;
      if (scc.mods.energyScale && d.energy < 0) d.energy = Math.round(d.energy * scc.mods.energyScale);
    }
  }
  return d;
}

function updateStats() {
  document.getElementById('stats-bar').style.display = 'flex';
  document.getElementById('gpa-num').textContent = gpaStr(S.gpa);
  ['energy','social','money'].forEach(k => {
    document.getElementById('bar-'+k).style.width = clamp(S[k],0,100)+'%';
    document.getElementById('val-'+k).textContent = S[k];
  });
  document.getElementById('semester-label').textContent = S.semester===0 ? 'Fall Semester' : 'Spring Semester';
}

function identityBar() {
  const maj = MAJORS.find(m => m.id === S.major);
  const mp  = MEAL_PLANS.find(m => m.id === S.mealPlan);
  const fg  = FRIEND_GROUPS.find(f => f.id === S.friendGroup);
  const scc = SPRING_COMMITS.find(c => c.id === S.springCommit);
  const parts = [];
  if (maj) parts.push(`${maj.icon} <span>${maj.name}</span>`);
  if (mp)  parts.push(`${mp.icon} <span>${mp.name}</span>`);
  if (fg)  parts.push(`${fg.icon} <span>${fg.name}</span>`);
  if (scc) parts.push(`${scc.icon} <span>${scc.name}</span>`);
  return parts.length ? `<div class="identity-bar">${parts.join(' &nbsp;·&nbsp; ')}</div>` : '';
}

      <div class="summary-card"><div class="s-label">📚 GPA</div><div class="s-val">${gpaStr(S.gpa)}</div></div>
      <div class="summary-card"><div class="s-label">⚡ ENERGY</div><div class="s-val">${S.energy}</div></div>
      <div class="summary-card"><div class="s-label">🎉 SOCIAL</div><div class="s-val">${S.social}</div></div>
      <div class="summary-card"><div class="s-label">💰 MONEY</div><div class="s-val">${S.money}</div></div>
    </div>
    <button class="big-btn" onclick="startFall()">⚔️ BEGIN FALL SEMESTER</button>`;
}

function startFall() { S.phase='game'; S.semester=0; S.scenarioIndex=0; updateStats(); showScenario(); }

function showFriendGroupSelect() {
  showCardSelect('CHOOSE YOUR FRIEND GROUP','Week 3. You\'ve met people. Now you must choose your people. This shapes the rest of fall.',FRIEND_GROUPS,'confirmFriendGroup()');
}
function confirmFriendGroup() {
  S.friendGroup = S.selectedCard; S.selectedCard = null;
  const fg = FRIEND_GROUPS.find(f => f.id === S.friendGroup);
  if (fg.mods.socialBonus) S.social = clamp(S.social + fg.mods.socialBonus, 0, 100);
  updateStats();
  S.scenarioIndex = 2;
  showScenario();
}

function showSpringCommitSelect() {
  showCardSelect('SPRING COMMITMENT','Spring semester. Time to commit to something beyond surviving. This shapes your final campaign.',SPRING_COMMITS,'confirmSpringCommit()');
}
function confirmSpringCommit() {
  S.springCommit = S.selectedCard; S.selectedCard = null;
  S.energy = clamp(S.energy + 15, 0, 100);
  updateStats();
  S.semester = 1; S.scenarioIndex = 0;
  showSpringBriefing();
}

function showSpringBriefing() {
  clear();
  const sc = SPRING_COMMITS.find(c => c.id === S.springCommit);
  ca().innerHTML = `
    <div class="semester-banner">🌸 SPRING SEMESTER BRIEFING</div>
    ${identityBar()}
    <div style="font-size:0.95em;line-height:1.7;color:#3a2010;">You survived the fall. Now ${sc.name.toLowerCase()} awaits alongside five new battles. The year ends here — fight well.</div>
    <div class="summary-grid" style="margin-top:8px;">
      <div class="summary-card"><div class="s-label">📚 GPA</div><div class="s-val">${gpaStr(S.gpa)}</div></div>
      <div class="summary-card"><div class="s-label">⚡ ENERGY</div><div class="s-val">${S.energy}</div></div>
      <div class="summary-card"><div class="s-label">🎉 SOCIAL</div><div class="s-val">${S.social}</div></div>
      <div class="summary-card"><div class="s-label">💰 MONEY</div><div class="s-val">${S.money}</div></div>
    </div>
    <button class="big-btn" onclick="updateStats();showScenario()">⚔️ BEGIN SPRING SEMESTER</button>`;
}

// ── SCENARIO ENGINE ───────────────────────────────────────────────────────────
function showScenario() {
  const scens = S.semester === 0 ? FALL_SCENARIOS : SPRING_SCENARIOS;
  if (S.semester === 0 && S.scenarioIndex === 2 && !S.friendGroup) { showFriendGroupSelect(); return; }
  if (S.scenarioIndex >= scens.length) { showSemesterEnd(); return; }
  const sc = getDynamicScenario(scens[S.scenarioIndex]);
  S._currentScenario = sc;
  const semLabel = S.semester === 0 ? '☀️ FALL SEMESTER' : '🌸 SPRING SEMESTER';
  const letters = ['A','B','C','D'];
  clear();
  ca().innerHTML = `
    ${identityBar()}
    <div class="scenario-num">${semLabel} · SCENARIO ${S.scenarioIndex+1} of ${scens.length}</div>
    <div class="concept-tag">☯ ${sc.concept}</div>
    <div class="scenario-title">${sc.title}</div>
    <div class="sunzi-quote">"${sc.quote}" <span class="attr">— Sun Tzu</span></div>
    <div class="scenario-text">${sc.text}</div>
    <div id="choices">${sc.choices.map((ch,i)=>`<button class="choice-btn" onclick="resolveChoice(${i})" id="ch${i}"><span class="choice-letter">${letters[i]}.</span>${ch.text}</button>`).join('')}</div>
    <div id="outcome-panel"></div>
    <button class="big-btn" id="next-btn" style="display:none;" onclick="advance()">CONTINUE →</button>`;
}

function resolveChoice(idx) {
  const sc = S._currentScenario;
  const ch = sc.choices[idx];
  document.querySelectorAll('.choice-btn').forEach((b,i) => { b.disabled=true; b.style.opacity= i===idx?'1':'0.45'; });
  document.getElementById('ch'+idx).style.borderColor = '#e8c040';

  // Track memorable moments
  if (sc.trackKey && ch.trackVal) S[sc.trackKey] = ch.trackVal;

  let d = applyMods(ch.stats, sc);
  S.gpa    = clamp(S.gpa    + (d.gpa||0),    0, 4.0);
  S.energy = clamp(S.energy + (d.energy||0),  0, 100);
  S.social = clamp(S.social + (d.social||0),  0, 100);
  S.money  = clamp(S.money  + (d.money||0),   0, 100);
  updateStats();

  const tone = (d.gpa||0) >= 0 && (d.energy||0) >= -10 ? 'outcome-good' : 'outcome-bad';
  const changes = [];
  if (d.gpa)    changes.push(`GPA <span class="${d.gpa>0?'plus':'minus'}">${d.gpa>0?'+':''}${d.gpa.toFixed(1)}</span>`);
  if (d.energy) changes.push(`Energy <span class="${d.energy>0?'plus':'minus'}">${d.energy>0?'+':''}${d.energy}</span>`);
  if (d.social) changes.push(`Social <span class="${d.social>0?'plus':'minus'}">${d.social>0?'+':''}${d.social}</span>`);
  if (d.money)  changes.push(`Money <span class="${d.money>0?'plus':'minus'}">${d.money>0?'+':''}${d.money}</span>`);

  let modNote = '';
  const mp = MEAL_PLANS.find(m => m.id === S.mealPlan);
  if (mp && sc.isFoodEvent) {
    if (mp.mods.foodShield) modNote += `<span class="bonus-tag">${mp.icon} Meal Shield</span>`;
    if (mp.mods.foodPenalty) modNote += `<span class="penalty-tag">${mp.icon} Ramen Penalty</span>`;
  }

  const op = document.getElementById('outcome-panel');
  op.innerHTML = `<span class="${tone}">${ch.outcome}</span>${modNote?'<div style="margin-top:4px;">'+modNote+'</div>':''}<div class="stat-change">${changes.join(' &nbsp;·&nbsp; ')}</div>`;
  op.classList.add('show');
  document.getElementById('next-btn').style.display = 'block';
  op.scrollIntoView({ behavior:'smooth', block:'nearest' });

  if (S.gpa < 2.0 || S.energy <= 0 || S.social <= 0 || S.money <= 0) setTimeout(showGameOver, 1400);
}

function advance() {
  S.scenarioIndex++;
  if (S.gpa < 2.0 || S.energy <= 0 || S.social <= 0 || S.money <= 0) { showGameOver(); return; }
  showScenario();
}

function showSemesterEnd() {
  clear();
  if (S.semester === 0) {
    ca().innerHTML = `
      <div class="semester-banner">☀️ FALL SEMESTER COMPLETE</div>
      ${identityBar()}
      <div style="font-size:0.95em;line-height:1.7;color:#3a2010;margin-bottom:10px;">You have survived the fall. Before spring begins, you must make one more commitment.</div>
      <div class="summary-grid">
        <div class="summary-card"><div class="s-label">📚 GPA</div><div class="s-val">${gpaStr(S.gpa)}</div></div>
        <div class="summary-card"><div class="s-label">⚡ ENERGY</div><div class="s-val">${S.energy}</div></div>
        <div class="summary-card"><div class="s-label">🎉 SOCIAL</div><div class="s-val">${S.social}</div></div>
        <div class="summary-card"><div class="s-label">💰 MONEY</div><div class="s-val">${S.money}</div></div>
      </div>
      <button class="big-btn" style="margin-top:10px;" onclick="showSpringCommitSelect()">CHOOSE SPRING COMMITMENT →</button>`;
  } else { showWin(); }
}

// ── END SCREENS ───────────────────────────────────────────────────────────────
function showWin() {
  clear();
  document.getElementById('stats-bar').style.display = 'none';
  let rank, wisdom;
  if (S.gpa >= 3.7)      { rank='Grand General';       wisdom='You have transcended academia. Sun Tzu himself would audit your elective.'; }
  else if (S.gpa >= 3.0) { rank='Seasoned Strategist'; wisdom='You fought wisely, adapted well, and emerged with dignity intact.'; }
  else if (S.gpa >= 2.5) { rank='Capable Soldier';     wisdom='You survived. Not always gracefully — but the battlefield does not grade on grace.'; }
  else                   { rank='Scarred Veteran';      wisdom='You are still standing. That alone is a victory Sun Tzu did not predict.'; }

  const maj = MAJORS.find(m => m.id === S.major);
  const mp  = MEAL_PLANS.find(m => m.id === S.mealPlan);
  const fg  = FRIEND_GROUPS.find(f => f.id === S.friendGroup);
  const sc  = SPRING_COMMITS.find(c => c.id === S.springCommit);

  ca().innerHTML = `
    <div style="text-align:center;padding:8px 0 4px;">
      <div style="font-size:2em;">🎓</div>
      <div class="end-title win">FRESHMAN YEAR COMPLETE</div>
      <div style="font-family:'Cinzel',serif;color:var(--gold);font-size:1.05em;margin:4px 0;">Rank Achieved: ${rank}</div>
    </div>
    <div class="summary-grid">
      <div class="summary-card"><div class="s-label">📚 FINAL GPA</div><div class="s-val">${gpaStr(S.gpa)}</div></div>
      <div class="summary-card"><div class="s-label">⚡ ENERGY</div><div class="s-val">${S.energy}</div></div>
      <div class="summary-card"><div class="s-label">🎉 SOCIAL</div><div class="s-val">${S.social}</div></div>
      <div class="summary-card"><div class="s-label">💰 MONEY</div><div class="s-val">${S.money}</div></div>
    </div>
    <div class="end-wisdom">"${wisdom}"<br><em style="font-size:0.85em;color:#8a5030;">— The Ancient Masters (probably)</em></div>
    <div style="background:rgba(44,24,16,0.05);border:2px solid var(--gold);border-radius:4px;padding:12px 14px;">
      <div style="font-family:'Cinzel',serif;font-size:1em;color:var(--red-ink);margin-bottom:4px;">⚔️ Identity Summary</div>
      <div style="font-size:0.9em;line-height:1.7;color:#3a2010;">
        ${maj?`Major: <strong>${maj.icon} ${maj.name}</strong><br>`:''}
        ${mp?`Dining: <strong>${mp.icon} ${mp.name}</strong><br>`:''}
        ${fg?`Crew: <strong>${fg.icon} ${fg.name}</strong><br>`:''}
        ${sc?`Spring: <strong>${sc.icon} ${sc.name}</strong>`:''}
      </div>
    </div>
    <div class="journal-section">📓 The Chronicle of Freshman Year</div>
    <div style="font-family:'Special Elite',cursive;font-size:0.82em;color:#5a3010;margin-bottom:10px;font-style:italic;">As transcribed by the Ancient Historians of the College</div>
    <div style="display:flex;flex-direction:column;gap:14px;">${buildChronicle()}</div>
    <button class="big-btn" style="margin-top:8px;" onclick="showTitle()">↩ PLAY AGAIN</button>`;
}

function showGameOver() {
  clear();
  document.getElementById('stats-bar').style.display = 'none';
  let reason = 'Your GPA collapsed below 2.0.';
  if (S.energy <= 0) reason = 'Your energy hit zero. You fell asleep permanently — in the middle of a final.';
  else if (S.social <= 0) reason = 'Your social life flatlined entirely. You became a campus legend for the wrong reasons.';
  else if (S.money <= 0) reason = 'Your funds evaporated. The dining hall became a distant memory.';
  ca().innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;padding:16px;">
      <div style="font-size:2em;">💀</div>
      <div class="end-title">CAMPAIGN FAILED</div>
      <div style="font-size:0.95em;line-height:1.6;max-width:460px;">${reason}<br><br>Sun Tzu warned you. He said it in at least three tutorial cards. The ancient wisdom was available. You simply chose a different path.</div>
      <div class="end-wisdom">"Victorious warriors win first and then go to war. Defeated warriors go to war first and then seek to win."<br><em style="font-size:0.85em;color:#8a5030;">— Sun Tzu</em></div>
      <button class="start-btn" onclick="showTitle()">↩ TRY AGAIN</button>
    </div>`;
}

showTitle();
</script>
</body>
</html>
