<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Clicker Game</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f0;
      margin: 0;
    }
    h1 { font-size: 1.2rem; color: #888; margin-bottom: 8px; }
    #count { font-size: 5rem; font-weight: bold; margin-bottom: 32px; }
    button {
      font-size: 4rem;
      background: none;
      border: none;
      cursor: pointer;
      transition: transform 0.08s;
      user-select: none;
    }
    button:active { transform: scale(0.88); }
    a { margin-top: 40px; color: #aaa; font-size: 0.875rem; }
  </style>
</head>
<body>
  <h1>clicks</h1>
  <div id="count">0</div>
  <button onclick="click_()">🖱️</button>
  <a href="/">← back</a>

  <script>
    let n = 0;
    function click_() {
      n++;
      document.getElementById('count').textContent = n.toLocaleString();
    }
  </script>
</body>
</html>
