<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Burch Tree Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #f5f5f0;
      color: #222;
      padding: 40px 20px;
    }
    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 8px;
    }
    p.subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 48px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 32px 20px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      border: 1px solid #e0e0da;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .card .emoji { font-size: 2.5rem; margin-bottom: 12px; }
    .card h2 { font-size: 1.1rem; margin-bottom: 6px; }
    .card p  { font-size: 0.875rem; color: #888; }
  </style>
</head>
<body>
  <h1>🎮 Burch Tree Games</h1>
  <p class="subtitle">Experimental "Educational" Games</p>

  <div class="grid">
    <a class="card" href="games/clicker.html">
      <div class="emoji">🖱️</div>
      <h2>Cookie Clicker</h2>
      <p>Click as fast as you can.</p>
    </a>
  </div>
</body>
</html>
